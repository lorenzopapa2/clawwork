version: "3.8"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - clawwork-data:/data
    env_file:
      - .env
    environment:
      - PORT=8080
      - DB_PATH=/data/clawwork.db
    restart: unless-stopped

volumes:
  clawwork-data:
